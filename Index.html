<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crumb Journal">
<title>Crumb Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5ede2;font-family:Georgia,serif;-webkit-text-size-adjust:100%}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#faf4ee}
.hdr{background:#3a2a1a;padding:20px 16px 16px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:22px;font-weight:bold;color:#f5e8d4}
.hdr-sub{font-size:11px;color:#8a7060;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.hdr-nav{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.nav-btn{padding:6px 12px;border-radius:20px;border:1.5px solid #5a4a3a;background:transparent;color:#c8a87a;font-family:Georgia,serif;font-size:12px;cursor:pointer;text-transform:uppercase}
.nav-btn.active{background:#c8a87a;color:#3a2a1a;border-color:#c8a87a}
.content{padding:16px}
.list-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.list-count{font-size:16px;color:#3a2a1a;font-weight:bold}
.new-btn{background:#5a3a1a;color:#f5e8d4;border:none;border-radius:20px;padding:8px 16px;font-family:Georgia,serif;font-size:13px;cursor:pointer}
.card{background:#fdf8f3;border:1.5px solid #e0d0c0;border-radius:12px;margin-bottom:10px;cursor:pointer;overflow:hidden;box-shadow:0 1px 3px rgba(100,60,20,.07)}
.card-img{width:100%;height:180px;object-fit:cover;display:block;border-bottom:1px solid #e0d0c0}
.card-body{padding:12px 14px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-title{font-size:17px;font-weight:bold;color:#3a2a1a}
.card-date{font-size:12px;color:#8a7060;margin-left:8px}
.badge{border-radius:20px;padding:3px 10px;font-weight:bold;font-size:14px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{background:#f0e8dc;color:#7a5a3a;border-radius:5px;padding:2px 8px;font-size:11px}
.card-note{font-size:12px;color:#8a7060;margin-top:6px;font-style:italic}
.thumbs{display:flex;gap:5px;margin-top:8px;overflow-x:auto}
.thumb{width:60px;height:60px;object-fit:cover;border-radius:7px;border:1px solid #e0d0c0;flex-shrink:0;cursor:pointer}
.form-wrap{padding-bottom:40px}
.form-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.form-title{font-size:20px;font-weight:bold;color:#3a2a1a}
.close-btn{background:none;border:none;font-size:22px;color:#8a7060;cursor:pointer;padding:4px}
.sec{margin-bottom:18px}
.sec-title{font-size:12px;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:#7a5a3a;border-bottom:1px solid #e0d0c0;padding-bottom:5px;margin-bottom:12px}
.fld{margin-bottom:12px}
.fld-lbl{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#8a7060;margin-bottom:3px}
input,textarea,select{width:100%;box-sizing:border-box;padding:8px 10px;border:1.5px solid #d4c4b4;border-radius:7px;background:#fdf8f3;font-family:Georgia,serif;font-size:14px;color:#3a2a1a;outline:none;-webkit-appearance:none;appearance:none}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hydbar{background:#f0e8dc;border-radius:8px;padding:9px 12px;font-size:14px;color:#5a3a1a;margin-bottom:4px;display:flex;justify-content:space-between}
.row-wrap{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.row-wrap input{flex:1}
.row-wrap input.grams{width:65px;flex:none;text-align:right}
.remove-btn{background:none;border:none;color:#c08070;font-size:20px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1}
.add-row-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px dashed #c4a88a;border-radius:7px;background:transparent;color:#8a6a4a;font-family:Georgia,serif;font-size:12px;cursor:pointer;margin-top:4px}
.toggle-row{display:flex;gap:7px;margin-top:2px}
.tog{padding:6px 16px;border-radius:20px;cursor:pointer;border:1.5px solid #d4c4b4;background:#fdf8f3;color:#8a7060;font-family:Georgia,serif;font-size:13px}
.tog.active{border-color:#7a5a3a;background:#f0e8dc;color:#5a3a1a}
.score-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.score-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #d4c4b4;background:#fdf8f3;color:#8a7060;font-family:Georgia,serif;font-weight:bold;font-size:13px;cursor:pointer}
.score-btn.active{border-width:2.5px;border-color:#7a5a3a}
.levain-check{border-radius:7px;padding:6px 10px;font-size:12px;margin-bottom:5px;display:flex;justify-content:space-between}
.levain-ok{background:#e8f0e4;color:#4a6a3a}
.levain-warn{background:#fdf0e0;color:#8a5a20}
.photo-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.photo-wrap{position:relative}
.photo-edit-thumb{width:85px;height:85px;object-fit:cover;border-radius:9px;border:1.5px solid #d4c4b4;cursor:pointer;display:block}
.photo-x{position:absolute;top:-6px;right:-6px;background:#5a3a1a;border:none;color:#fff;font-size:10px;border-radius:50%;width:20px;height:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.add-photo-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;border:1.5px dashed #c4a88a;border-radius:9px;background:#fdf8f3;color:#7a5a3a;font-family:Georgia,serif;font-size:13px;cursor:pointer}
.save-btn{width:100%;padding:13px;background:#5a3a1a;color:#fdf8f3;border:none;border-radius:10px;font-family:Georgia,serif;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px}
.del-btn{width:100%;padding:10px;background:none;color:#a05a4a;border:1.5px solid #d4b4a4;border-radius:10px;font-family:Georgia,serif;font-size:14px;cursor:pointer}
.lightbox{position:fixed;inset:0;background:rgba(10,5,2,.94);z-index:2000;display:flex;align-items:center;justify-content:center}
.lightbox img{max-width:95vw;max-height:88vh;border-radius:9px;object-fit:contain}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;border-radius:50%;width:38px;height:38px;cursor:pointer}
.compare-photos{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto}
.cp-wrap{flex-shrink:0;text-align:center}
.cp-img{width:76px;height:76px;object-fit:cover;border-radius:9px;border:1.5px solid #e0d0c0;cursor:pointer;display:block}
.cp-ph{width:76px;height:76px;border-radius:9px;background:#f0e8dc;display:flex;align-items:center;justify-content:center;font-size:24px;border:1.5px solid #e0d0c0}
.cp-lbl{font-size:11px;color:#7a5a3a;margin-top:3px;font-weight:bold}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 7px;color:#8a7060;border-bottom:2px solid #e0d0c0;text-transform:uppercase;letter-spacing:.05em;font-size:10px;text-align:left;white-space:nowrap}
.tbl th.tc{text-align:center;font-size:12px;color:#3a2a1a;letter-spacing:0;text-transform:none}
.tbl td{padding:8px 7px;border-bottom:1px solid #ede0d4;word-break:break-word;max-width:110px}
.tbl td.tc{text-align:center;color:#3a2a1a}
.tbl tr:nth-child(even){background:#f7f0e8}
.tbl tr:nth-child(odd){background:#fdf8f3}
.grain-card{background:#fdf8f3;border:1.5px solid #e0d0c0;border-radius:12px;margin-bottom:10px;cursor:pointer;padding:12px 14px;box-shadow:0 1px 3px rgba(100,60,20,.07)}
.grain-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.grain-name{font-size:17px;font-weight:bold;color:#3a2a1a}
.grain-farm{font-size:12px;color:#8a7060;font-style:italic;margin-bottom:6px}
.grain-best{font-size:12px;color:#5a4a3a;margin-top:5px}
.grain-tasting{font-size:12px;color:#6a5a4a;margin-top:3px;line-height:1.5}
.empty-state{color:#8a7060;font-style:italic;font-size:13px;text-align:center;margin-top:40px}
.blend-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.blend-tag{background:#efe5d5;color:#5a3a1a;border-radius:5px;padding:2px 8px;font-size:11px}
.total-tag{background:#e8e0d4;color:#5a4a3a;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:bold}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Compatibility shims ───────────────────────────────────────────────────────
if (!Array.prototype.flat) {
  Array.prototype.flat = function() {
    var result = [];
    for (var i = 0; i < this.length; i++) {
      if (Array.isArray(this[i])) {
        for (var j = 0; j < this[i].length; j++) result.push(this[i][j]);
      } else { result.push(this[i]); }
    }
    return result;
  };
}

// ── Storage keys ──────────────────────────────────────────────────────────────
var BAKE_KEY = "cj-bakes-v1";
var GRAIN_KEY = "cj-grains-v1";

// ── Initial data ──────────────────────────────────────────────────────────────
var INIT_BAKES = [
  {id:1,date:"2025-05",testNum:1,flours:[{name:"Hard White Wheat (fresh-milled)",grams:428}],hydration1Pct:80,water1G:342,hydration2Pct:10,water2G:43,saltG:9,levain:{totalG:64,buildHr:5,components:[{name:"Hard White Wheat flour",grams:32},{name:"Ripe starter",grams:16},{name:"Water",grams:16}]},slapFoldMin:5,stretchFolds:4,sifted:"No",autolyseHr:1,bulkHr:4.5,bulkTempNote:"Warm ambient (LA summer)",retard:"Overnight",bakeTempF:450,bakeTimeMin:45,ovenSpring:"None - very flat",crumb:"Dense, tight crumb",crust:"Dark, hard",taste:"Good flavour",score:4,keyIssue:"Overfermented bulk (4.5 hr too long at warm temp)",nextChange:"Reduce bulk to 3.5 hr; drop hydration to 75%",notes:"",photos:[]},
  {id:2,date:"2025-05",testNum:2,flours:[{name:"Hard White Wheat (fresh-milled)",grams:428}],hydration1Pct:75,water1G:321,hydration2Pct:10,water2G:43,saltG:9,levain:{totalG:64,buildHr:5,components:[{name:"Hard White Wheat flour",grams:32},{name:"Ripe starter",grams:16},{name:"Water",grams:16}]},slapFoldMin:5,stretchFolds:4,sifted:"No",autolyseHr:1,bulkHr:3.5,bulkTempNote:"Warm ambient",retard:"Overnight",bakeTempF:450,bakeTimeMin:45,ovenSpring:"None - flat, no ear",crumb:"Slightly more open than T1, still tight",crust:"Dark",taste:"Good flavour",score:5,keyIssue:"Still too high hydration for structure; no ear",nextChange:"Drop hydration further to 70%",notes:"",photos:[]},
  {id:3,date:"2025-05",testNum:3,flours:[{name:"Hard White Wheat (fresh-milled)",grams:428}],hydration1Pct:70,water1G:300,hydration2Pct:10,water2G:43,saltG:9,levain:{totalG:64,buildHr:5,components:[{name:"Hard White Wheat flour",grams:32},{name:"Ripe starter",grams:16},{name:"Water",grams:16}]},slapFoldMin:5,stretchFolds:4,sifted:"No",autolyseHr:1,bulkHr:3.5,bulkTempNote:"Warm ambient",retard:"Overnight",bakeTempF:450,bakeTimeMin:45,ovenSpring:"No ear; slightly taller than T1/T2",crumb:"More even crumb, slightly more open; best so far",crust:"Dark",taste:"Good flavour",score:6,keyIssue:"Still flat; gluten development / structure still weak",nextChange:"Test 2hr autolyse vs 1hr; track bulk temp",notes:"",photos:[]}
];

var INIT_GRAINS = [
  {id:1,name:"Hard White Wheat",farm:"Central Milling",type:"Whole grain berry",season:"",origin:"",tastingNotes:"Mild, slightly sweet, clean flavour.",bestFor:"100% whole grain sourdough, sandwich loaves",rating:8,notes:"First grain used for fresh-milling tests."}
];

// ── Storage helpers ───────────────────────────────────────────────────────────
function loadBakes() {
  try {
    var s = localStorage.getItem(BAKE_KEY);
    return s ? JSON.parse(s) : INIT_BAKES;
  } catch(e) { return INIT_BAKES; }
}
function saveBakes(bakes) {
  try { localStorage.setItem(BAKE_KEY, JSON.stringify(bakes)); } catch(e) {}
}
function loadGrains() {
  try {
    var s = localStorage.getItem(GRAIN_KEY);
    return s ? JSON.parse(s) : INIT_GRAINS;
  } catch(e) { return INIT_GRAINS; }
}
function saveGrains(grains) {
  try { localStorage.setItem(GRAIN_KEY, JSON.stringify(grains)); } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function totalFlourG(b) {
  var t = 0;
  var fl = b.flours || [];
  for (var i = 0; i < fl.length; i++) t += parseFloat(fl[i].grams) || 0;
  return t;
}
function totalHydration(b) {
  var fl = totalFlourG(b) || 1;
  var w1 = parseFloat(b.water1G) || (fl * b.hydration1Pct / 100);
  var w2 = parseFloat(b.water2G) || (fl * b.hydration2Pct / 100);
  return Math.round(((w1 + w2) / fl) * 100);
}
function flourSummary(b) {
  var fl = b.flours || [];
  if (!fl.length) return "-";
  if (fl.length === 1) return fl[0].name;
  var t = totalFlourG(b) || 1;
  var parts = [];
  for (var i = 0; i < fl.length; i++) {
    parts.push(Math.round((fl[i].grams / t) * 100) + "% " + fl[i].name);
  }
  return parts.join(" / ");
}
function scoreBg(s) { return s >= 8 ? "#e8f0e4" : s >= 6 ? "#f5f0e0" : "#f5e8e4"; }
function scoreCol(s) { return s >= 8 ? "#5a7a4a" : s >= 6 ? "#8a7a3a" : "#8a4a3a"; }
function readFileAsBase64(file, cb) {
  var r = new FileReader();
  r.onload = function() { cb(r.result); };
  r.readAsDataURL(file);
}
function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function inp(placeholder, value, type) {
  var e = document.createElement("input");
  e.type = type || "text";
  e.placeholder = placeholder || "";
  e.value = value != null ? value : "";
  return e;
}
function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

// ── State ─────────────────────────────────────────────────────────────────────
var state = {
  bakes: loadBakes(),
  grains: loadGrains(),
  view: "list",
  selected: null,
  isNew: false,
  selectedGrain: null,
  isNewGrain: false,
  lightbox: null
};

function setState(patch) {
  var keys = Object.keys(patch);
  for (var i = 0; i < keys.length; i++) state[keys[i]] = patch[keys[i]];
  render();
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function renderLightbox(src) {
  var box = el("div", "lightbox");
  var img = document.createElement("img");
  img.src = src;
  box.appendChild(img);
  var btn = el("button", "lb-close", "✕");
  btn.onclick = function() { setState({lightbox: null}); };
  box.appendChild(btn);
  box.onclick = function(ev) { if (ev.target === box) setState({lightbox: null}); };
  return box;
}

// ── Bake card ─────────────────────────────────────────────────────────────────
function renderBakeCard(bake) {
  var card = el("div", "card");
  var photos = bake.photos || [];
  var flours = bake.flours || [];
  var flourTotal = totalFlourG(bake);
  var hydration = totalHydration(bake);

  if (photos.length > 0) {
    var hero = document.createElement("img");
    hero.className = "card-img";
    hero.src = photos[0];
    hero.onclick = function(ev) { ev.stopPropagation(); setState({lightbox: photos[0]}); };
    card.appendChild(hero);
  }

  var body = el("div", "card-body");

  var top = el("div", "card-top");
  var left = el("div");
  var titleSpan = el("span", "card-title", "Test #" + bake.testNum);
  var dateSpan = el("span", "card-date", bake.date);
  left.appendChild(titleSpan);
  left.appendChild(dateSpan);
  top.appendChild(left);
  if (bake.score !== "") {
    var badge = el("span", "badge", bake.score + "/10");
    badge.style.background = scoreBg(bake.score);
    badge.style.color = scoreCol(bake.score);
    top.appendChild(badge);
  }
  body.appendChild(top);

  if (flours.length === 1) {
    var fn = el("div", null, flours[0].name);
    fn.style.cssText = "font-size:13px;color:#5a4a3a;margin-bottom:6px";
    body.appendChild(fn);
  } else {
    var bt = el("div", "blend-tags");
    for (var i = 0; i < flours.length; i++) {
      var pct = Math.round(((parseFloat(flours[i].grams) || 0) / flourTotal) * 100);
      bt.appendChild(el("span", "blend-tag", pct + "% " + flours[i].name));
    }
    body.appendChild(bt);
  }

  var tags = el("div", "tags");
  var tagList = [
    flourTotal + "g flour",
    hydration + "% hydration",
    bake.autolyseHr + "hr autolyse",
    bake.bulkHr + "hr bulk"
  ];
  if (bake.slapFoldMin) tagList.push(bake.slapFoldMin + "min slap/fold");
  if (bake.stretchFolds) tagList.push(bake.stretchFolds + "x S&F");
  if (bake.sifted && bake.sifted !== "No") tagList.push("Sifted: " + bake.sifted);
  for (var t = 0; t < tagList.length; t++) tags.appendChild(el("span", "tag", tagList[t]));
  body.appendChild(tags);

  if (photos.length > 1) {
    var thumbs = el("div", "thumbs");
    for (var p = 1; p < photos.length; p++) {
      (function(src) {
        var th = document.createElement("img");
        th.className = "thumb";
        th.src = src;
        th.onclick = function(ev) { ev.stopPropagation(); setState({lightbox: src}); };
        thumbs.appendChild(th);
      })(photos[p]);
    }
    body.appendChild(thumbs);
  }

  if (bake.ovenSpring) body.appendChild(el("div", "card-note", "↑ " + bake.ovenSpring));
  card.appendChild(body);

  card.onclick = function() { setState({view:"form", selected: deepCopy(bake), isNew: false}); };
  return card;
}

// ── Form helpers ──────────────────────────────────────────────────────────────
function fld(label, child) {
  var w = el("div", "fld");
  w.appendChild(el("div", "fld-lbl", label));
  w.appendChild(child);
  return w;
}
function sec(title) {
  var s = el("div", "sec");
  s.appendChild(el("div", "sec-title", title));
  for (var i = 1; i < arguments.length; i++) s.appendChild(arguments[i]);
  return s;
}
function grid2() {
  var g = el("div", "grid2");
  for (var i = 0; i < arguments.length; i++) g.appendChild(arguments[i]);
  return g;
}

// ── Flour editor ──────────────────────────────────────────────────────────────
function renderFlourEditor(form, onUpdate) {
  var wrap = el("div");

  function rebuild() {
    wrap.innerHTML = "";
    var flours = form.flours;
    var total = totalFlourG(form);

    for (var i = 0; i < flours.length; i++) {
      (function(idx) {
        var row = el("div", "row-wrap");
        var nameEl = inp("Grain / flour name", flours[idx].name);
        nameEl.oninput = function() { form.flours[idx].name = this.value; onUpdate(); };
        var gramsEl = inp("g", flours[idx].grams, "number");
        gramsEl.className = "grams";
        gramsEl.oninput = function() { form.flours[idx].grams = parseFloat(this.value) || ""; onUpdate(); };
        row.appendChild(nameEl);
        row.appendChild(gramsEl);
        if (flours.length > 1) {
          var rb = el("button", "remove-btn", "×");
          rb.onclick = function() { form.flours.splice(idx, 1); rebuild(); onUpdate(); };
          row.appendChild(rb);
        }
        wrap.appendChild(row);
      })(i);
    }

    if (flours.length > 1 && total > 0) {
      var bt = el("div", "blend-tags");
      for (var j = 0; j < flours.length; j++) {
        var pct = Math.round(((parseFloat(flours[j].grams) || 0) / total) * 100);
        bt.appendChild(el("span", "blend-tag", pct + "% " + (flours[j].name || "?")));
      }
      bt.appendChild(el("span", "total-tag", total + "g total"));
      wrap.appendChild(bt);
    }

    var addBtn = el("button", "add-row-btn", "+ Add flour");
    addBtn.onclick = function() { form.flours.push({name:"",grams:""}); rebuild(); };
    wrap.appendChild(addBtn);
  }

  rebuild();
  return wrap;
}

// ── Levain editor ─────────────────────────────────────────────────────────────
function renderLevainEditor(form, onUpdate) {
  var wrap = el("div");

  function rebuild() {
    wrap.innerHTML = "";
    var levain = form.levain;

    var totalEl = inp("g", levain.totalG, "number");
    totalEl.oninput = function() { form.levain.totalG = parseFloat(this.value) || 0; rebuild(); };
    var buildEl = inp("hr", levain.buildHr, "number");
    buildEl.oninput = function() { form.levain.buildHr = parseFloat(this.value) || 0; };
    wrap.appendChild(grid2(fld("Total levain (g)", totalEl), fld("Build time (hr)", buildEl)));

    var compLabel = el("div", "fld-lbl", "Levain components");
    compLabel.style.marginBottom = "6px";
    wrap.appendChild(compLabel);

    var comps = levain.components;
    for (var i = 0; i < comps.length; i++) {
      (function(idx) {
        var row = el("div", "row-wrap");
        var nameEl = inp("e.g. Hard white flour, Water, Ripe starter", comps[idx].name);
        nameEl.oninput = function() { form.levain.components[idx].name = this.value; };
        var gramsEl = inp("g", comps[idx].grams, "number");
        gramsEl.className = "grams";
        gramsEl.oninput = function() { form.levain.components[idx].grams = parseFloat(this.value) || ""; rebuild(); };
        row.appendChild(nameEl);
        row.appendChild(gramsEl);
        if (comps.length > 1) {
          var rb = el("button", "remove-btn", "×");
          rb.onclick = function() { form.levain.components.splice(idx, 1); rebuild(); };
          row.appendChild(rb);
        }
        wrap.appendChild(row);
      })(i);
    }

    var ct = 0;
    for (var j = 0; j < comps.length; j++) ct += parseFloat(comps[j].grams) || 0;
    if (ct > 0) {
      var ok = ct === parseFloat(levain.totalG);
      var check = el("div", "levain-check " + (ok ? "levain-ok" : "levain-warn"));
      check.innerHTML = "<span>Components total</span><strong>" + ct + "g " + (ok ? "✓" : "(target: " + levain.totalG + "g)") + "</strong>";
      wrap.appendChild(check);
    }

    var addBtn = el("button", "add-row-btn", "+ Add component");
    addBtn.onclick = function() { form.levain.components.push({name:"",grams:""}); rebuild(); };
    wrap.appendChild(addBtn);
  }

  rebuild();
  return wrap;
}

// ── Photo editor ──────────────────────────────────────────────────────────────
function renderPhotoEditor(form) {
  var wrap = el("div");
  var fileInp = document.createElement("input");
  fileInp.type = "file";
  fileInp.accept = "image/*";
  fileInp.multiple = true;
  fileInp.style.cssText = "position:absolute;opacity:0;pointer-events:none;width:1px;height:1px";
  wrap.appendChild(fileInp);

  function rebuild() {
    while (wrap.children.length > 1) wrap.removeChild(wrap.lastChild);
    var photos = form.photos || [];

    if (photos.length > 0) {
      var grid = el("div", "photo-grid");
      for (var i = 0; i < photos.length; i++) {
        (function(idx, src) {
          var pw = el("div", "photo-wrap");
          var img = document.createElement("img");
          img.className = "photo-edit-thumb";
          img.src = src;
          img.onclick = function() { setState({lightbox: src}); };
          var xbtn = el("button", "photo-x", "✕");
          xbtn.onclick = function() { form.photos.splice(idx, 1); rebuild(); };
          pw.appendChild(img);
          pw.appendChild(xbtn);
          grid.appendChild(pw);
        })(i, photos[i]);
      }
      wrap.appendChild(grid);
    }

    var addBtn = el("button", "add-photo-btn");
    addBtn.innerHTML = "<span style='font-size:17px'>📷</span> " + (photos.length > 0 ? "Add more photos" : "Add photo");
    addBtn.onclick = function() { fileInp.click(); };
    wrap.appendChild(addBtn);
  }

  fileInp.onchange = function() {
    var files = fileInp.files;
    if (!files || !files.length) return;
    var loaded = 0;
    var newPhotos = [];
    for (var i = 0; i < files.length; i++) {
      (function(file) {
        readFileAsBase64(file, function(data) {
          newPhotos.push(data);
          loaded++;
          if (loaded === files.length) {
            for (var j = 0; j < newPhotos.length; j++) form.photos.push(newPhotos[j]);
            rebuild();
          }
        });
      })(files[i]);
    }
    fileInp.value = "";
  };

  rebuild();
  return wrap;
}

// ── Score picker ──────────────────────────────────────────────────────────────
function renderScorePicker(form, key) {
  var row = el("div", "score-row");

    (function(num) {

      btn.onclick = function() {
        form[key] = num;

        for (var i = 0; i < btns.length; i++) {

    })(n);
  }
  return row;
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportData() {
  var data = {bakes: state.bakes, grains: state.grains};
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "crumb-journal-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

          alert("Imported " + d.length + " bakes.");

    content.appendChild(listHdr);
    var sorted = state.bakes.slice().sort(function(a,b){ return b.testNum - a.testNum; });
    for (var si = 0; si < sorted.length; si++) content.appendChild(renderBakeCard(sorted[si]));
  }
  else if (state.view === "form" && state.selected) {
    content.appendChild(renderBakeForm(state.selected, state.isNew));
  }
  else if (state.view === "compare") {
    var ch = el("div");
    ch.style.cssText = "font-size:16px;font-weight:bold;color:#3a2a1a;margin-bottom:14px";
    ch.textContent = "Side-by-side comparison";
    content.appendChild(ch);
    content.appendChild(renderCompare(state.bakes));
  }
  else if (state.view === "grains") {
    var gh = el("div", "list-hdr");
    gh.appendChild(el("div", "list-count", state.grains.length + " grain" + (state.grains.length !== 1 ? "s" : "") + " logged"));
    var ngBtn = el("button", "new-btn", "+ New Grain");
    ngBtn.onclick = function() {
      setState({view:"grainForm", selectedGrain:{id:null,name:"",farm:"",type:"",season:"",origin:"",tastingNotes:"",bestFor:"",rating:"",notes:""}, isNewGrain:true});
    };
    gh.appendChild(ngBtn);
    content.appendChild(gh);
    if (state.grains.length === 0) {
      content.appendChild(el("div", "empty-state", "No grains yet. Tap + New Grain to start your library."));
    }
    var gSorted = state.grains.slice().sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
    for (var gi = 0; gi < gSorted.length; gi++) content.appendChild(renderGrainCard(gSorted[gi]));
  }
  else if (state.view === "grainForm" && state.selectedGrain) {
    content.appendChild(renderGrainForm(state.selectedGrain, state.isNewGrain));
  }

  container.appendChild(content);
  app.appendChild(container);
}

render();
</script>
</body>
</html>
